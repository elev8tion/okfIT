name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build package but skip npm publish"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PKG_VERSION" = "$TAG_VERSION"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Demo
        run: pnpm demo

      - name: Pack dry run
        run: node scripts/publish-npm-readme.mjs --dry-run

      - name: Publish to npm
        if: github.event_name == 'release' || github.event.inputs.dry_run == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-npm-readme.mjs --provenance
